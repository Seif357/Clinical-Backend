name: Deploy
on:
  workflow_dispatch: 
  push:

jobs:
  test:
    name: Build and Test
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true  
          cache-dependency-path: '**/*.csproj'
          
      - name: Restore Dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --no-restore
  deploy:
    name: Publish and Deploy
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: '**/*.csproj' # Added for consistency

      - name: Publish Application
        # Removed redundant restore step as publish handles restore by default (utilizing the cache)
        run: dotnet publish --configuration Release --output ./publish --runtime win-x86 --self-contained true

      - name: Deploy to MonsterASP.NET via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
          source-path: ./publish
